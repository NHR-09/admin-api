<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Todo - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: #2d3748;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            background: #f7fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .btn-danger:hover {
            background: #c53030;
            transform: translateY(-1px);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .notification-item {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .notification-item:hover {
            border-color: #cbd5e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .notification-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .notification-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .type-announcement { background: #bee3f8; color: #2b6cb0; }
        .type-update { background: #c6f6d5; color: #2f855a; }
        .type-feature { background: #fbb6ce; color: #b83280; }
        .type-maintenance { background: #fed7d7; color: #c53030; }

        .notification-message {
            color: #4a5568;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .notification-meta {
            font-size: 12px;
            color: #718096;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notification-actions {
            display: flex;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #718096;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success {
            background: #c6f6d5;
            color: #2f855a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: #4a5568;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .notification-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .notification-actions {
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Marvel Todo Admin</h1>
            <p>Manage notifications and monitor app activity</p>
        </div>

        <!-- Stats Section -->
        <div id="stats" class="stats-grid">
            <!-- Stats will be loaded here -->
        </div>

        <!-- Create Notification Form -->
        <div class="card">
            <h2>📢 Send Notification</h2>
            <form id="notificationForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" class="form-control" placeholder="Enter notification title" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" class="form-control" placeholder="Enter notification message" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" class="form-control" required>
                        <option value="announcement">📢 Announcement</option>
                        <option value="update">🔄 Update</option>
                        <option value="feature">✨ New Feature</option>
                        <option value="maintenance">🔧 Maintenance</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="actionUrl">Action URL (Optional)</label>
                    <input type="url" id="actionUrl" class="form-control" placeholder="https://example.com">
                </div>
                
                <button type="submit" class="btn btn-primary">Send Notification</button>
            </form>
        </div>

        <!-- Notifications List -->
        <div class="card">
            <h2>📋 Recent Notifications</h2>
            <div id="notifications">
                <div class="loading">Loading notifications...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const API_KEY = 'NHR09abc';

        const headers = {
            'Content-Type': 'application/json',
            'x-api-key': API_KEY
        };

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/stats`, { headers });
                const data = await response.json();
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${data.totalNotifications || 0}</div>
                        <div class="stat-label">Total Notifications</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.activeNotifications || 0}</div>
                        <div class="stat-label">Active Notifications</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${data.totalUsers || 0}</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load stats:', error);
                document.getElementById('stats').innerHTML = '';
            }
        }

        // Load notifications
        async function loadNotifications() {
            try {
                const response = await fetch(`${API_BASE}/api/notifications`, { headers });
                const data = await response.json();
                
                const container = document.getElementById('notifications');
                
                if (!data.notifications || data.notifications.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No notifications yet</h3>
                            <p>Create your first notification using the form above</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.notifications.map(notification => `
                    <div class="notification-item">
                        <div class="notification-header">
                            <div>
                                <div class="notification-title">${notification.title}</div>
                                <span class="notification-type type-${notification.type}">${notification.type}</span>
                            </div>
                            <div class="notification-actions">
                                <button class="btn btn-danger btn-small" onclick="deleteNotification('${notification.id}')">
                                    Delete
                                </button>
                            </div>
                        </div>
                        <div class="notification-message">${notification.message}</div>
                        <div class="notification-meta">
                            <span>${new Date(notification.createdAt).toLocaleDateString()} ${new Date(notification.createdAt).toLocaleTimeString()}</span>
                            <span>${notification.active ? '🟢 Active' : '🔴 Inactive'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('notifications').innerHTML = `
                    <div class="error">Failed to load notifications: ${error.message}</div>
                `;
            }
        }

        // Send notification
        document.getElementById('notificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('title').value,
                message: document.getElementById('message').value,
                type: document.getElementById('type').value,
                actionUrl: document.getElementById('actionUrl').value || null
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/notifications/broadcast`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Show success message
                    const successDiv = document.createElement('div');
                    successDiv.className = 'success';
                    successDiv.textContent = 'Notification sent successfully!';
                    document.querySelector('.card').insertBefore(successDiv, document.getElementById('notificationForm'));
                    
                    // Clear form
                    document.getElementById('notificationForm').reset();
                    
                    // Reload data
                    loadNotifications();
                    loadStats();
                    
                    // Remove success message after 3 seconds
                    setTimeout(() => successDiv.remove(), 3000);
                } else {
                    throw new Error(result.error || 'Failed to send notification');
                }
            } catch (error) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = `Error: ${error.message}`;
                document.querySelector('.card').insertBefore(errorDiv, document.getElementById('notificationForm'));
                
                setTimeout(() => errorDiv.remove(), 5000);
            }
        });

        // Delete notification
        async function deleteNotification(id) {
            if (!confirm('Are you sure you want to delete this notification?')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/notifications/${id}`, {
                    method: 'DELETE',
                    headers
                });
                
                if (response.ok) {
                    loadNotifications();
                    loadStats();
                } else {
                    const result = await response.json();
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Initialize
        loadStats();
        loadNotifications();
    </script>
</body>
</html>
